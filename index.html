<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyHabits</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">Filtres</span>
      <button class="sidebar-close" id="sidebarClose" aria-label="Fermer">✕</button>
    </div>
    <div class="filter-section">
      <div class="filter-label">Catégorie</div>
      <div class="filter-options">
        <button class="filter-chip active" data-filter="category" data-value="all">Toutes</button>
        <button class="filter-chip" data-filter="category" data-value="Professionnelle">Professionnelle</button>
        <button class="filter-chip" data-filter="category" data-value="Personnelle">Personnelle</button>
        <button class="filter-chip" data-filter="category" data-value="Famille">Famille</button>
        <button class="filter-chip" data-filter="category" data-value="Santé">Santé</button>
        <button class="filter-chip" data-filter="category" data-value="Bien-être">Bien-être</button>
        <button class="filter-chip" data-filter="category" data-value="Passion">Passion</button>
        <button class="filter-chip" data-filter="category" data-value="Autres">Autres</button>
      </div>
    </div>
    <div class="filter-section">
      <div class="filter-label">Couleur</div>
      <div class="filter-options">
        <button class="filter-chip active" data-filter="color" data-value="all">Toutes</button>
        <button class="filter-chip color-chip" data-filter="color" data-value="vert" style="--chip-color:#22C55E">Vert</button>
        <button class="filter-chip color-chip" data-filter="color" data-value="bleu" style="--chip-color:#3B82F6">Bleu</button>
        <button class="filter-chip color-chip" data-filter="color" data-value="jaune" style="--chip-color:#EAB308">Jaune</button>
        <button class="filter-chip color-chip" data-filter="color" data-value="orange" style="--chip-color:#F97316">Orange</button>
        <button class="filter-chip color-chip" data-filter="color" data-value="rouge" style="--chip-color:#EF4444">Rouge</button>
        <button class="filter-chip color-chip" data-filter="color" data-value="gris" style="--chip-color:#94A3B8">Gris</button>
      </div>
    </div>
    <div class="filter-section">
      <div class="filter-label">Trier par</div>
      <div class="filter-options">
        <button class="filter-chip active" data-filter="sort" data-value="date">Date de début</button>
        <button class="filter-chip" data-filter="sort" data-value="mostDone">Plus réalisées</button>
        <button class="filter-chip" data-filter="sort" data-value="name">Nom A→Z</button>
      </div>
    </div>
    <button class="btn-reset-filters" id="resetFilters">Réinitialiser les filtres</button>
  </aside>

  <div class="app-wrapper">

    <header class="app-header">
      <button class="btn-menu" id="btnMenu" aria-label="Filtres">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <rect x="2" y="5" width="16" height="1.8" rx="0.9" fill="currentColor"/>
          <rect x="2" y="9.1" width="11" height="1.8" rx="0.9" fill="currentColor"/>
          <rect x="2" y="13.2" width="14" height="1.8" rx="0.9" fill="currentColor"/>
        </svg>
      </button>
      <h1 class="app-title">MyHabits</h1>
      <button class="btn-add" id="btnAdd" aria-label="Ajouter une habitude">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <line x1="9" y1="2" x2="9" y2="16" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
          <line x1="2" y1="9" x2="16" y2="9" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
        </svg>
      </button>
    </header>

    <main class="main-content">

      <!-- Dashboard -->
      <section class="dashboard">
        <div class="dash-card dash-done">
          <span class="dash-count" id="dashDone">0</span>
          <span class="dash-label">Validées</span>
        </div>
        <div class="dash-card dash-late">
          <span class="dash-count" id="dashLate">0</span>
          <span class="dash-label">En retard</span>
        </div>
        <div class="dash-card dash-total">
          <span class="dash-count" id="dashTotal">0</span>
          <span class="dash-label">Total</span>
        </div>
      </section>

      <!-- Active filter badge -->
      <div class="active-filter-bar" id="activeFilterBar" style="display:none">
        <span class="active-filter-text" id="activeFilterText"></span>
        <button class="clear-filter-btn" id="clearFilter">✕</button>
      </div>

      <!-- Habitudes en retard -->
      <section class="habits-section" id="lateSection" style="display:none">
        <h2 class="section-title section-title--late">⚠ En retard</h2>
        <div class="habits-list" id="lateList"></div>
      </section>

      <!-- Aujourd'hui -->
      <section class="habits-section">
        <h2 class="section-title">Aujourd'hui</h2>
        <div class="habits-list" id="todayList"></div>
      </section>

      <!-- À venir -->
      <section class="habits-section">
        <h2 class="section-title">À venir</h2>
        <div class="habits-list" id="upcomingList"></div>
      </section>

    </main>
  </div>

  <!-- Modal Ajout -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="modalTitle">Nouvelle habitude</h2>
        <button class="modal-close" id="modalClose">✕</button>
      </div>
      <form class="modal-form" id="habitForm" novalidate>
        <div class="form-group">
          <label class="form-label" for="habitName">Nom de l'habitude</label>
          <input class="form-input" type="text" id="habitName" placeholder="Ex : Méditation du matin" required />
        </div>
        <div class="form-group">
          <label class="form-label">Couleur</label>
          <div class="color-picker">
            <button type="button" class="color-dot" data-color="vert"   style="background:#22C55E" title="Vert"></button>
            <button type="button" class="color-dot" data-color="bleu"   style="background:#3B82F6" title="Bleu"></button>
            <button type="button" class="color-dot" data-color="jaune"  style="background:#EAB308" title="Jaune"></button>
            <button type="button" class="color-dot" data-color="orange" style="background:#F97316" title="Orange"></button>
            <button type="button" class="color-dot" data-color="rouge"  style="background:#EF4444" title="Rouge"></button>
            <button type="button" class="color-dot" data-color="gris"   style="background:#94A3B8" title="Gris"></button>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="habitCategory">Catégorie</label>
          <select class="form-input form-select" id="habitCategory">
            <option value="Professionnelle">Professionnelle</option>
            <option value="Personnelle">Personnelle</option>
            <option value="Famille">Famille</option>
            <option value="Santé">Santé</option>
            <option value="Bien-être">Bien-être</option>
            <option value="Passion">Passion</option>
            <option value="Autres">Autres</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label" for="habitStart">Date de début</label>
          <input class="form-input" type="date" id="habitStart" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="habitRepeat">Se répète tous les</label>
          <div class="repeat-row">
            <input class="form-input repeat-input" type="number" id="habitRepeat" min="1" max="365" value="1" required />
            <span class="repeat-unit">jours</span>
          </div>
        </div>
        <div class="form-actions">
          <button type="button" class="btn-secondary" id="cancelBtn">Annuler</button>
          <button type="submit" class="btn-primary">Enregistrer</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal Détail -->
  <div class="modal-overlay" id="detailOverlay">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="detailName">—</h2>
        <button class="modal-close" id="detailClose">✕</button>
      </div>
      <div class="detail-body">
        <div class="detail-row">
          <span class="detail-key">Catégorie</span>
          <span class="detail-value" id="detailCategory">—</span>
        </div>
        <div class="detail-row">
          <span class="detail-key">Date de début</span>
          <span class="detail-value" id="detailStart">—</span>
        </div>
        <div class="detail-row">
          <span class="detail-key">Fréquence</span>
          <span class="detail-value" id="detailRepeat">—</span>
        </div>
        <div class="detail-row">
          <span class="detail-key">Total réalisations</span>
          <span class="detail-value detail-count" id="detailCount">0</span>
        </div>
        <!-- Séries -->
        <div class="detail-streaks">
          <div class="streak-box">
            <span class="streak-value" id="detailStreakCurrent">0</span>
            <span class="streak-label">Série en cours</span>
          </div>
          <div class="streak-divider"></div>
          <div class="streak-box">
            <span class="streak-value streak-value--max" id="detailStreakMax">0</span>
            <span class="streak-label">Série max</span>
          </div>
        </div>
      </div>
      <button class="btn-delete" id="detailDelete">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <line x1="1" y1="1" x2="13" y2="13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <line x1="13" y1="1" x2="1" y2="13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        Supprimer l'habitude
      </button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
